name: Monthly Model Retrain

on:
  schedule:
    - cron: '0 18 1 * *'  # 毎月1日 3:00 JST (= 18:00 UTC前日)
  workflow_dispatch:
    inputs:
      force:
        description: '改善なしでも強制更新'
        required: false
        type: boolean
        default: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download data assets
        run: |
          mkdir -p db results
          gh release download data-latest -p "keirin.db" -D db/
          gh release download data-latest -p "model_lgbm.pkl" -D results/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Retrain model
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/retrain_model.py $FORCE_FLAG

      - name: Upload updated model
        if: always()
        run: |
          gh release upload data-latest results/model_lgbm.pkl --clobber
          gh release upload data-latest results/feature_importance.csv --clobber 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-logs-${{ github.run_number }}
          path: results/
          retention-days: 90
